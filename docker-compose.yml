services:

  # ── MySQL ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: products
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    mem_limit: 512m
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    mem_limit: 1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Embedder ──────────────────────────────────────────────────
  embedder:
    build:
      context: ./embed-service
    container_name: embedder
    mem_limit: 3g
    ports:
      - "8001:8001"
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/app/model-store
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ── App ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: app
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      embedder:
        condition: service_healthy
    environment:
      DOCKER: "true"
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: products
      DB_USER: app
      DB_PASSWORD: secret
      ELASTICSEARCH_URL: http://elasticsearch:9200
      EMBEDDER_URL: http://embedder:8001
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  mysql_data:
  es_data: